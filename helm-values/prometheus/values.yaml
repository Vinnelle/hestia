server:
  retention: 15d
  persistentVolume:
    enabled: true
    size: 20Gi
  extraScrapeConfigs: |
    - job_name: 'arc'
      kubernetes_sd_configs:
        - role: pod
          namespaces:
            names:
              - arc-systems
              - arc-runners
      relabel_configs:
        - source_labels: [__meta_kubernetes_pod_container_port_number]
          regex: "8080"
          action: keep
        - source_labels: [__meta_kubernetes_namespace]
          target_label: namespace
        - source_labels: [__meta_kubernetes_pod_name]
          target_label: pod
alertmanager:
  enabled: false
prometheus-pushgateway:
  enabled: false
