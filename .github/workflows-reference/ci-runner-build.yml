name: Build CI runner image

on:
  push:
    branches: [prd]
    paths:
      - "hestia/ci-runner/Dockerfile"
      - ".github/workflows/ci-runner-build.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-push:
    runs-on: arc-runner-gaia
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/harbor-login
        with:
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      # docker-container driver spins up a separate BuildKit container with
      # its own network/DNS by default, so it doesn't see the pod-level
      # hostAliases (registry.vinnel.cloud -> node_ip, routing large
      # pushes around Cloudflare's body-size cap) the way `docker login`
      # does. network=host shares the dind daemon's netns instead, so it
      # picks up the same resolution.
      - uses: docker/setup-buildx-action@v4
        with:
          driver-opts: network=host

      - uses: docker/build-push-action@v7
        with:
          context: hestia/ci-runner
          push: true
          tags: |
            registry.vinnel.cloud/vinnel-cloud/ci-runner:latest
            registry.vinnel.cloud/vinnel-cloud/ci-runner:${{ github.sha }}
