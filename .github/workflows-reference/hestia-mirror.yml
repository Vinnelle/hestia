name: Mirror hestia

on:
  push:
    branches: [prd]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

jobs:
  wait-for-terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/wait-for-terraform

  mirror:
    needs: wait-for-terraform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: gaia

      - uses: actions/checkout@v5
        with:
          repository: Vinnelle/hestia
          token: ${{ secrets.GH_API_TOKEN }}
          path: hestia

      - run: |
          rsync -a --delete --exclude='.git' --exclude='.github/workflows' gaia/hestia/ hestia/

          rm -rf hestia/.github
          mkdir -p hestia/.github
          rsync -a gaia/.github/actions hestia/.github/
          rsync -a gaia/.github/workflows/ hestia/.github/workflows-reference/

          cd hestia
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "sync: mirror gaia@${{ github.sha }}"
          git push
