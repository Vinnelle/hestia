name: Terraform Plan/Apply

# CLI-driven runs against the TFC "hestia" workspace (cloud block in
# hestia/versions.tf). The workspace's VCS trigger must be disabled in TFC
# for org "lover" or every push double-runs (this workflow + TFC's own
# auto-plan) and the two race for the state lock.

on:
  push:
    branches: [prd]
  pull_request:
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:
  wait-for-validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/wait-for-validate

  plan-apply:
    needs: wait-for-validate
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: hestia
    env:
      TF_TOKEN_app_terraform_io: ${{ secrets.TFC_API_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: hashicorp/setup-terraform@v4

      - run: terraform init -input=false

      - id: plan
        run: |
          set +e
          terraform plan -input=false -out=tfplan -detailed-exitcode
          exit_code=$?
          echo "exitcode=$exit_code" >> "$GITHUB_OUTPUT"
          [ "$exit_code" -ne 1 ]

      # apply only on push to prd with actual changes; PRs get a speculative plan only
      - if: github.ref == 'refs/heads/prd' && github.event_name == 'push' && steps.plan.outputs.exitcode == '2'
        run: terraform apply -input=false tfplan
