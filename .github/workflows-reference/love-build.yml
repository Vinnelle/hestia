name: Build love

on:
  push:
    branches: [prd]
    paths:
      - "love/love.c"
      - ".github/workflows/love-build.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read

jobs:
  wait-for-terraform:
    runs-on: arc-runner-gaia
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/wait-for-terraform

  # compile check only — the released binary is built in the mirror job, and
  # momus compiles from source at pod start, so no binary is committed to git
  build:
    needs: wait-for-terraform
    runs-on: arc-runner-gaia
    steps:
      - uses: actions/checkout@v7

      - run: sudo apt-get update && sudo apt-get install -y build-essential

      - name: Compile
        run: cc -O3 -D_FORTIFY_SOURCE=3 -fstack-protector-strong -fPIE -pie -Wl,-z,relro,-z,now -o love/love love/love.c

  mirror:
    needs: build
    runs-on: arc-runner-gaia
    steps:
      - uses: actions/checkout@v7
        with:
          path: hestia

      - uses: actions/checkout@v7
        with:
          repository: Vinnelle/love
          token: ${{ secrets.GH_API_TOKEN }}
          path: love

      - name: Mirror source
        run: |
          cp hestia/love/love.c love/love.c
          cd love
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet && exit 0
          git commit -m "sync: mirror love.c from hestia@${{ github.sha }}"
          git push

      - run: sudo apt-get update && sudo apt-get install -y build-essential

      # arc-runner-gaia's image doesn't ship gh on PATH
      - run: type -p gh >/dev/null || (sudo apt-get update && sudo apt-get install -y gh)

      - name: Release binary
        env:
          GH_TOKEN: ${{ secrets.GH_API_TOKEN }}
        run: |
          cc -O3 -D_FORTIFY_SOURCE=3 -fstack-protector-strong -fPIE -pie -Wl,-z,relro,-z,now -o hestia/love/love hestia/love/love.c
          tag="v${{ github.run_number }}"
          gh release view "$tag" --repo Vinnelle/love >/dev/null 2>&1 && exit 0
          gh release create "$tag" hestia/love/love \
            --repo Vinnelle/love \
            --title "$tag" \
            --notes "compiled from hestia@${{ github.sha }}"
