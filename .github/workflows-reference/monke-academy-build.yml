name: Deploy monke-academy

on:
  push:
    branches: [prd]
    paths:
      - "hestia/monke-academy/site/**"
      - ".github/workflows/monke-academy-build.yml"
      - ".github/workflows/site-deploy.yml"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read

jobs:
  wait-for-terraform:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/wait-for-terraform

  deploy:
    needs: wait-for-terraform
    uses: ./.github/workflows/site-deploy.yml
    with:
      context: hestia/monke-academy/site
      image: monke-academy/site
      deployment: monke-academy-site
      purge_zone: monke.academy
    secrets: inherit
