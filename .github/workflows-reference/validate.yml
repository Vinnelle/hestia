name: Validate

# terraform plan/apply live in terraform.yml, not here: this job only fmt/lints.
# Called from terraform.yml (every plan run) so it can't run stale/missing;
# workflow_dispatch stays for standalone manual runs.
on:
  workflow_call: {}
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: validate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    runs-on: arc-runner-gaia
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      # setup-terraform's output wrapper shells to `node`; arc-runner-gaia's
      # image doesn't ship it on PATH like ubuntu-latest does.
      - run: sudo apt-get update && sudo apt-get install -y nodejs

      - uses: hashicorp/setup-terraform@v4

      - run: terraform fmt -check -diff -recursive

      - uses: terraform-linters/setup-tflint@v6

      # lints every directory containing .tf files
      - run: tflint --recursive

  go:
    runs-on: arc-runner-gaia
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version: stable
          cache-dependency-path: "**/go.sum"

      - name: Fmt, vet, and test every Go module
        run: |
          git ls-files '*go.mod' | while read -r mod; do
            dir=$(dirname "$mod")
            echo "==> $dir"
            (cd "$dir" && test -z "$(gofmt -l .)" && go vet ./... && go test ./...) || exit 1
          done

  shellcheck:
    runs-on: arc-runner-gaia
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - run: sudo apt-get update && sudo apt-get install -y shellcheck

      # -S warning skips info/style-level findings
      - run: git ls-files '*.sh' | xargs shellcheck -S warning

  yamllint:
    runs-on: arc-runner-gaia
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - run: sudo apt-get update && sudo apt-get install -y yamllint

      # helm values + Talos patches; workflow .yml is covered by actionlint below
      - run: git ls-files '*.yaml' | xargs yamllint -d relaxed

  actionlint:
    runs-on: arc-runner-gaia
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7

      - run: type -p curl >/dev/null || (sudo apt-get update && sudo apt-get install -y curl)

      # pinned release tarball, not the floating `main`-branch install script
      - name: Install actionlint
        run: |
          type -p actionlint >/dev/null && exit 0
          version=1.7.7
          curl -fsSL "https://github.com/rhysd/actionlint/releases/download/v${version}/actionlint_${version}_linux_amd64.tar.gz" -o /tmp/actionlint.tar.gz
          sudo tar -xzf /tmp/actionlint.tar.gz -C /usr/local/bin actionlint
          sudo chmod 0755 /usr/local/bin/actionlint
          rm /tmp/actionlint.tar.gz

      - run: actionlint -color

  secrets:
    runs-on: arc-runner-gaia
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
