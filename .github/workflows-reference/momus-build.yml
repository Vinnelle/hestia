name: Build momus

on:
  push:
    branches: [prd]
    paths:
      - "hestia/momus/Dockerfile"
      - "hestia/momus/entrypoint.sh"
      - "love/love.c"
      - ".github/workflows/momus-build.yml"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write

jobs:
  wait-for-terraform:
    runs-on: arc-runner-gaia
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/wait-for-terraform

  build-push:
    needs: wait-for-terraform
    runs-on: arc-runner-gaia
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/harbor-login
        with:
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - uses: docker/setup-buildx-action@v4

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: hestia/momus/Dockerfile
          platforms: linux/amd64
          pull: true
          push: true
          tags: |
            registry.vinnel.cloud/vinnel-cloud/momus:${{ github.sha }}
          cache-from: type=registry,ref=registry.vinnel.cloud/vinnel-cloud/momus:buildcache
          cache-to: type=registry,ref=registry.vinnel.cloud/vinnel-cloud/momus:buildcache,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

  record:
    needs: build-push
    runs-on: arc-runner-gaia
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/record-image-digest
        with:
          updates: '{"momus":"registry.vinnel.cloud/vinnel-cloud/momus@${{ needs.build-push.outputs.digest }}"}'
          message: "deploy: pin Momus image digest"
