name: Deploy vinnel-cloud

on:
  push:
    branches: [prd]
    paths:
      - "hestia/vinnel-cloud/site/**"
      - "hestia/vinnel-cloud/dashboard/**"
      - ".github/workflows/vinnel-cloud-build.yml"
  workflow_dispatch: {}

permissions:
  contents: write
  actions: read

jobs:
  wait-for-terraform:
    runs-on: arc-runner-gaia
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/wait-for-terraform

  build-push:
    needs: wait-for-terraform
    runs-on: arc-runner-gaia
    concurrency:
      group: site-deploy-vinnel-cloud-${{ github.ref_name }}
      cancel-in-progress: true
    strategy:
      matrix:
        include:
          - app: site
            context: hestia/vinnel-cloud/site
            image: vinnel-cloud/site
          - app: dashboard
            context: hestia/vinnel-cloud/dashboard
            image: vinnel-cloud/dashboard
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - uses: ./.github/actions/harbor-login
        with:
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - uses: docker/setup-buildx-action@v4

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            registry.vinnel.cloud/${{ matrix.image }}:latest
            registry.vinnel.cloud/${{ matrix.image }}:${{ github.sha }}

      # matrix job outputs clobber each other, so digests travel as artifacts
      - name: Save image digest
        run: |
          mkdir -p /tmp/digests
          printf '%s' "${{ steps.build.outputs.digest }}" > "/tmp/digests/${{ matrix.app }}"

      - uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.app }}
          path: /tmp/digests/${{ matrix.app }}

  record:
    needs: build-push
    runs-on: arc-runner-gaia
    concurrency:
      # Shared with momus-build.yml and site-deploy.yml: all three write
      # hestia/images.json, and only this small job needs to serialize —
      # the docker build above and the rollout below stay free to run in
      # parallel with other deploys.
      group: images-json-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - name: Record immutable image digests
        run: |
          echo "SITE_DIGEST=$(cat /tmp/digests/site)" >> "$GITHUB_ENV"
          echo "DASHBOARD_DIGEST=$(cat /tmp/digests/dashboard)" >> "$GITHUB_ENV"

      - uses: ./.github/actions/record-image-digest
        with:
          updates: |
            {
              "vinnel-cloud-site": "registry.vinnel.cloud/vinnel-cloud/site@${{ env.SITE_DIGEST }}",
              "vinnel-cloud-dashboard": "registry.vinnel.cloud/vinnel-cloud/dashboard@${{ env.DASHBOARD_DIGEST }}"
            }
          message: "deploy: pin vinnel-cloud image digests"

  deploy:
    needs: [build-push, record]
    runs-on: arc-runner-gaia
    concurrency:
      group: site-deploy-vinnel-cloud-${{ github.ref_name }}
      cancel-in-progress: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - uses: actions/download-artifact@v8
        with:
          pattern: digest-*
          path: /tmp/digests
          merge-multiple: true

      - run: type -p curl >/dev/null || (sudo apt-get update && sudo apt-get install -y curl)
      - run: type -p jq >/dev/null || (sudo apt-get update && sudo apt-get install -y jq)

      - uses: ./.github/actions/setup-kubectl
        with:
          kubeconfig: ${{ secrets.HESTIA_KUBECONFIG }}

      # The digests were committed in the record job before this imperative
      # rollout. Terraform reconciles the same immutable references in the
      # subsequent VCS run.
      - run: |
          kubectl set image deployment/vinnel-cloud-site -n websites \
            "*=registry.vinnel.cloud/vinnel-cloud/site@$(cat /tmp/digests/site)"
          kubectl set image deployment/vinnel-cloud-dashboard -n websites \
            "*=registry.vinnel.cloud/vinnel-cloud/dashboard@$(cat /tmp/digests/dashboard)"
          kubectl rollout status deployment/vinnel-cloud-site -n websites
          kubectl rollout status deployment/vinnel-cloud-dashboard -n websites

      # purge only after new pods serve traffic, otherwise the CDN re-caches the old build
      - name: Purge Cloudflare cache
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_NAME: vinnel.cloud
        run: |
          zone_id=$(curl -fsS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=$ZONE_NAME" | jq -re '.result[0].id')
          curl -fsS -X POST \
            -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            "https://api.cloudflare.com/client/v4/zones/$zone_id/purge_cache" | jq -e '.success'
