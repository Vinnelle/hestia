name: Deploy site

on:
  workflow_call:
    inputs:
      context:
        description: "Docker build context path"
        required: true
        type: string
      image:
        description: "Harbor repo path (project/name)"
        required: true
        type: string
      deployment:
        description: "Deployment name in the websites namespace"
        required: true
        type: string
      purge_zone:
        description: "Cloudflare zone name to purge after rollout (empty = skip)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  group: site-deploy-${{ inputs.deployment }}
  cancel-in-progress: true

jobs:
  build-push:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - name: Log in to Harbor
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        shell: bash
        run: |
          for attempt in 1 2 3 4 5; do
            if printf '%s' "$HARBOR_PASSWORD" | docker login registry.vinnel.cloud \
              --username "$HARBOR_USERNAME" --password-stdin; then
              exit 0
            fi
            sleep "$((attempt * 5))"
          done
          echo "unable to connect to Harbor after five attempts" >&2
          exit 1

      - uses: docker/setup-buildx-action@v4

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          push: true
          tags: |
            registry.vinnel.cloud/${{ inputs.image }}:latest
            registry.vinnel.cloud/${{ inputs.image }}:${{ github.sha }}

  record-and-deploy:
    needs: build-push
    runs-on: ubuntu-latest
    # No shared concurrency group here: GitHub keeps only one pending job per
    # group, so with 3+ simultaneous site deploys one would be silently
    # cancelled. Manifest push races are handled by the rebase-retry loop, and
    # rollouts wait without a timeout (capped by timeout-minutes) since
    # parallel deploys contend on the single node.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - name: Record immutable image digest
        env:
          DEPLOYMENT: ${{ inputs.deployment }}
          IMAGE: registry.vinnel.cloud/${{ inputs.image }}@${{ needs.build-push.outputs.digest }}
        run: |
          jq --arg deployment "$DEPLOYMENT" --arg image "$IMAGE" \
            '.[$deployment] = $image' hestia/images.json > hestia/images.json.tmp
          mv hestia/images.json.tmp hestia/images.json
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add hestia/images.json
          git diff --cached --quiet || git commit -m "deploy: pin $DEPLOYMENT image digest"
          for attempt in 1 2 3; do
            git fetch origin "$GITHUB_REF_NAME"
            git rebase "origin/$GITHUB_REF_NAME"
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              exit 0
            fi
            sleep "$attempt"
          done
          echo "failed to push site image digest after three attempts" >&2
          exit 1

      - run: |
          mkdir -p ~/.kube
          cat <<'EOF' > ~/.kube/config
          ${{ secrets.HESTIA_KUBECONFIG }}
          EOF

      # The digest was committed above before this imperative rollout. Terraform
      # reconciles the same immutable reference in the subsequent VCS run.
      - run: |
          kubectl set image "deployment/${{ inputs.deployment }}" -n websites \
            '*=registry.vinnel.cloud/${{ inputs.image }}@${{ needs.build-push.outputs.digest }}'
          kubectl rollout status "deployment/${{ inputs.deployment }}" -n websites

      # purge only after new pods serve traffic, otherwise the CDN re-caches the old build
      - name: Purge Cloudflare cache
        if: inputs.purge_zone != ''
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_NAME: ${{ inputs.purge_zone }}
        run: |
          zone_id=$(curl -fsS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=$ZONE_NAME" | jq -re '.result[0].id')
          curl -fsS -X POST \
            -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            "https://api.cloudflare.com/client/v4/zones/$zone_id/purge_cache" | jq -e '.success'
