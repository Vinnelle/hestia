name: Deploy site

on:
  workflow_call:
    inputs:
      context:
        description: "Docker build context path"
        required: true
        type: string
      image:
        description: "Harbor repo path (project/name)"
        required: true
        type: string
      deployment:
        description: "Deployment name in the websites namespace"
        required: true
        type: string
      purge_zone:
        description: "Cloudflare zone name to purge after rollout (empty = skip)"
        required: false
        type: string
        default: ""

permissions:
  contents: write

jobs:
  build-push:
    runs-on: arc-runner-gaia
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - uses: ./.github/actions/harbor-login
        with:
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - uses: docker/setup-buildx-action@v4

      - id: build
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          push: true
          tags: |
            registry.vinnel.cloud/${{ inputs.image }}:latest
            registry.vinnel.cloud/${{ inputs.image }}:${{ github.sha }}

  record:
    needs: build-push
    runs-on: arc-runner-gaia
    concurrency:
      # Shared with momus-build.yml and vinnel-cloud-build.yml: all three
      # write hestia/images.json, and only this small job needs to
      # serialize — the docker build above stays free to run in parallel
      # with other deploys, and deploy below is a per-deployment concern.
      group: images-json-${{ github.ref_name }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - uses: ./.github/actions/record-image-digest
        with:
          updates: '{"${{ inputs.deployment }}":"registry.vinnel.cloud/${{ inputs.image }}@${{ needs.build-push.outputs.digest }}"}'
          message: "deploy: pin ${{ inputs.deployment }} image digest"

  deploy:
    needs: [build-push, record]
    runs-on: arc-runner-gaia
    concurrency:
      # Per-deployment: GitHub keeps only one pending job per group, so a
      # shared group across all sites would silently cancel one of 3+
      # simultaneous deploys. Rollouts wait without a timeout (capped by
      # timeout-minutes) since parallel deploys contend on the single node.
      group: site-deploy-${{ inputs.deployment }}
      cancel-in-progress: true
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.ref_name }}

      - uses: ./.github/actions/setup-kubectl
        with:
          kubeconfig: ${{ secrets.HESTIA_KUBECONFIG }}

      # The digest was committed in the record job before this imperative
      # rollout. Terraform reconciles the same immutable reference in the
      # subsequent VCS run.
      - run: |
          kubectl set image "deployment/${{ inputs.deployment }}" -n websites \
            '*=registry.vinnel.cloud/${{ inputs.image }}@${{ needs.build-push.outputs.digest }}'
          kubectl rollout status "deployment/${{ inputs.deployment }}" -n websites

      # purge only after new pods serve traffic, otherwise the CDN re-caches the old build
      - name: Purge Cloudflare cache
        if: inputs.purge_zone != ''
        env:
          CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ZONE_NAME: ${{ inputs.purge_zone }}
        run: |
          zone_id=$(curl -fsS -H "Authorization: Bearer $CF_TOKEN" \
            "https://api.cloudflare.com/client/v4/zones?name=$ZONE_NAME" | jq -re '.result[0].id')
          curl -fsS -X POST \
            -H "Authorization: Bearer $CF_TOKEN" -H "Content-Type: application/json" \
            --data '{"purge_everything":true}' \
            "https://api.cloudflare.com/client/v4/zones/$zone_id/purge_cache" | jq -e '.success'
