name: Wait for Terraform
description: >
  Blocks until the standalone Terraform Plan/Apply workflow run for this
  commit completes, and fails the step if it didn't succeed. Requires the
  actions:read permission on the calling job.

runs:
  using: composite
  steps:
    - shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        repo="${{ github.repository }}"
        sha="${{ github.event.pull_request.head.sha || github.sha }}"

        echo "looking for a Terraform run on $sha..."
        run_id=""
        for _ in $(seq 1 60); do
          run_id=$(gh run list --repo "$repo" --workflow=terraform.yml \
            --json headSha,databaseId --jq ".[] | select(.headSha==\"$sha\") | .databaseId" | head -n1)
          [ -n "$run_id" ] && break
          sleep 5
        done

        if [ -z "$run_id" ]; then
          echo "::error::no Terraform run found for $sha after 5 minutes"
          exit 1
        fi

        echo "waiting on Terraform run $run_id..."
        conclusion=""
        for _ in $(seq 1 60); do
          status=$(gh run view "$run_id" --repo "$repo" --json status --jq .status)
          if [ "$status" = "completed" ]; then
            conclusion=$(gh run view "$run_id" --repo "$repo" --json conclusion --jq .conclusion)
            break
          fi
          sleep 5
        done

        if [ -z "$conclusion" ]; then
          echo "::error::Terraform run $run_id did not complete within 5 minutes"
          exit 1
        fi

        echo "Terraform run $run_id concluded: $conclusion"
        [ "$conclusion" = "success" ]
