name: Setup kubectl
description: Installs kubectl and writes ~/.kube/config from the given kubeconfig secret.

inputs:
  kubeconfig:
    required: true

runs:
  using: composite
  steps:
    # arc-runner-gaia's image doesn't ship kubectl.
    - shell: bash
      run: |
        curl -fsSL -o kubectl "https://dl.k8s.io/release/$(curl -fsSL https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
        sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl

    - shell: bash
      env:
        KUBECONFIG_CONTENT: ${{ inputs.kubeconfig }}
      run: |
        mkdir -p -m 0700 ~/.kube
        umask 077
        printf '%s\n' "$KUBECONFIG_CONTENT" > ~/.kube/config
