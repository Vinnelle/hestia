name: Setup kubectl
description: Writes ~/.kube/config from the given kubeconfig secret. kubectl itself ships in the ci-runner image.

inputs:
  kubeconfig:
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        KUBECONFIG_CONTENT: ${{ inputs.kubeconfig }}
      run: |
        mkdir -p -m 0700 ~/.kube
        umask 077
        printf '%s\n' "$KUBECONFIG_CONTENT" > ~/.kube/config
