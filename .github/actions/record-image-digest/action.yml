name: Record image digest
description: >
  Merges one or more deployment->image digest pairs into hestia/images.json
  and pushes the commit, retrying on push/rebase races, then re-triggers
  terraform.yml for the new commit. No concurrency group needed on the
  calling job — the fetch/rebase/push retry loop below already handles
  concurrent writers; a shared GitHub concurrency group was tried instead
  but its "one queued job per group" limit silently canceled a third
  concurrent deploy's record job outright (never even ran, so the retry
  loop never got a chance) rather than letting it queue and retry. Requires
  the actions:write permission on the calling job (for the terraform.yml
  re-trigger).

inputs:
  updates:
    description: JSON object mapping images.json keys to image@digest refs, e.g. '{"momus":"registry/x@sha256:..."}'
    required: true
  message:
    description: Commit message
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        UPDATES: ${{ inputs.updates }}
        MESSAGE: ${{ inputs.message }}
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail

        jq --argjson updates "$UPDATES" '. + $updates' hestia/images.json > hestia/images.json.tmp
        jq empty hestia/images.json.tmp
        mv hestia/images.json.tmp hestia/images.json

        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add hestia/images.json

        if git diff --cached --quiet; then
          exit 0
        fi
        git commit -m "$MESSAGE"

        # Each command in the chain is guarded by the if/&&, not run bare in
        # the loop body — with `set -e` a bare failing `git rebase` would
        # kill the whole script on the first conflict instead of retrying.
        pushed=""
        for attempt in 1 2 3 4 5; do
          if git fetch origin "$GITHUB_REF_NAME" \
             && git rebase "origin/$GITHUB_REF_NAME" \
             && git push origin "HEAD:${GITHUB_REF_NAME}"; then
            pushed=1
            break
          fi
          git rebase --abort >/dev/null 2>&1 || true
          sleep "$attempt"
        done

        if [ -z "$pushed" ]; then
          echo "::error::failed to push image digest update after five attempts"
          exit 1
        fi

        # GITHUB_TOKEN-authored pushes don't fire push events (GitHub's
        # own loop-prevention), so this commit would otherwise never get
        # a terraform.yml run — leaving a permanent gap where any later
        # wait-for-terraform gate checking this exact sha hangs until a
        # genuine human push lands. workflow_dispatch via the API isn't
        # subject to that suppression, so trigger it explicitly instead.
        #
        # Not deduplicated against already-running terraform.yml runs on
        # purpose: a workflow_dispatch run's headSha is captured at
        # creation, not live-updated, and the images-json concurrency
        # lock this step runs under means any run already in flight was
        # necessarily queued for an older commit — it can't cover this
        # one. Dispatching every time is correct, not redundant; each
        # run serializes behind the last via terraform.yml's own
        # concurrency group rather than running wastefully in parallel.
        gh workflow run terraform.yml --repo "$GITHUB_REPOSITORY" --ref "$GITHUB_REF_NAME"
