loki:
  auth_enabled: false
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  # without retention the compactor keeps logs forever and the 20Gi PVC
  # eventually fills and wedges ingestion
  limits_config:
    retention_period: 720h # 30 days
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
deploymentMode: SingleBinary
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 20Gi
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0
minio:
  enabled: false
test:
  enabled: false
monitoring:
  selfMonitoring:
    enabled: false
  lokiCanary:
    enabled: false
gateway:
  enabled: false
