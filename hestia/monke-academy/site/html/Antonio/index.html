  <style>
    * {
      line-height: 1.2;
      margin: 0;
    }

    html {
      color: #888;
      display: table;
      font-family: sans-serif;
      height: 100%;
      text-align: center;
      width: 100%;
    }

    body {
      display: table-cell;
      vertical-align: auto;
      margin: 2em auto;
      background-image: url('imageRecourses/backgroundmobile.jpg');
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: unset;
    }

    .cbutton {
      border-radius: 4px;
      background-color: #f4511e;
      border: none;
      color: #FFFFFF;
      text-align: center;
      position: center;
      font-size: 15px;
      padding: 20px;
      padding-top: 20px;
      width: 150px;
      transition: all 0.5s;
      cursor: pointer;
      margin: 5px;
      height: auto;
    }

    .cbutton span {
      cursor: pointer;
      display: inline-block;
      position: relative;
      transition: 0.5s;
    }

    .cbutton span:after {
      content: '\00bb';
      position: absolute;
      opacity: 0;
      top: 0;
      right: -20px;
      transition: 0.5s;
    }

    .cbutton:hover span {
      padding-right: 25px;
    }

    .cbutton:hover span:after {
      opacity: 1;
      right: 0;
    }

    .cbutton:hover {
      background-color: gray;
      border: #0f0f0f;
      box-shadow: 0 12px 16px 0 rgba(0,0,0,0.24), 0 17px 50px 0 rgba(0,0,0,0.19);
    }

    h1 {
      font-size: 2em;
      font-weight: 400;
    }

    p {
      color: #4d4d4d;
      font-size: 2px;
      margin: 0 auto;
      width: 280px;
    }

    a {
      font-size: 2em;
    }

    input {
      border: none;
      background-color: #ffffff;
    }

    #signupb {
      width: 150px;
      height: auto;
      padding-top: 20px
    }

    .token {
      display: none;
    }

    @media only screen and (min-width: 601Px) {

      body {
        background-image: url('imageRecourses/background1.jpg');
        background-repeat: no-repeat;
        background-size: cover;
        background-attachment: unset;}

      .cbutton {
        border-radius: 4px;
        background-color: #FF3273;
        border: none;
        color: #FFFFFF;
        text-align: center;
        position: center;
        font-size: 15px;
        padding: 20px;
        width: 150px;
        transition: all 0.5s;
        cursor: pointer;
        margin: 5px;

        font-size: 3em;
        margin: 0 0 0.3em;
      }

      a {
        font-size: 3em;
      }

      .mbr {
        display: none;
      }
